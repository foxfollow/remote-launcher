name: shellcheck

on:
  push:
    branches: [main]
    paths:
      - "bin/**"
      - "install.sh"
      - "uninstall.sh"
      - "tests/**.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "bin/**"
      - "install.sh"
      - "uninstall.sh"
      - "tests/**.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2155 -e SC2088 -e SC2034
        with:
          scandir: "."
          ignore_paths: "tests/.test-keys tests/.test-output"
          severity: warning
